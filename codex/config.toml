approvals_reviewer = "user"
approval_policy = "never"
sandbox_mode = "danger-full-access"

[tui]
theme = "vscode"

[tui.model_availability_nux]
"gpt-5.5" = 4
"gpt-5.6-sol" = 2

[notice]
hide_full_access_warning = true

[projects."/home/akisarou"]
trust_level = "trusted"

[projects."/home/akisarou/dotfiles"]
trust_level = "trusted"

[projects."/home/akisarou/nable-solutions"]
trust_level = "trusted"

[mcp_servers.chrome-devtools]
command = "npx"
args = ["chrome-devtools-mcp@latest", "--browser-url=http://127.0.0.1:9222"]

[mcp_servers.react-aria]
command = "npx"
args = ["@react-aria/mcp@latest"]

[mcp_servers.expo]
url = "https://mcp.expo.dev/mcp"

[mcp_servers.argent]
command = "argent"
args = ["mcp"]

[mcp_servers.mdn]
url = "https://mcp.mdn.mozilla.net/"
http_headers = { "X-Moz-1st-Party-Data-Opt-Out" = "1" }

